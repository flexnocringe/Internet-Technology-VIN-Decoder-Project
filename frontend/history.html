<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIN History</title>
    <link rel="stylesheet" href="style/style.css" />
    <script type="module" src="js/history.js" defer></script>
</head>
<body class="app-page">
    <header class="topbar">
        <nav class="nav-links" aria-label="Primary">
            <a class="nav-link" href="decoder.html">Decoder</a>
            <a class="nav-link active" href="history.html">History</a>
        </nav>
    </header>

    <main class="app-shell">
        <section class="report-panel">
            <div class="section-heading">
                <h2>Previous requests</h2>
            </div>
            <div id="message" class="message" aria-live="polite"></div>
            <div id="historyList" class="history-list"></div>
        </section>
    </main>

    <div id="detailsModal" class="modal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-header">
                <h3 id="modalTitle" class="modal-title">VIN Details</h3>
                <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Close">&times;</button>
            </div>
            <div id="detailList" class="detail-list"></div>
        </div>
    </div>
</body>
</html>
