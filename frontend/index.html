<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Register</title>
    <link rel="stylesheet" href="style/style.css" />
    <script type="module" src="js/auth.js" defer></script>
</head>
<body>
    <main class="card">
        <h1>Welcome</h1>
        <p>Select an option to register or log in.</p>

        <div class="choice-row">
            <button id="showRegister" class="choice-btn" type="button">Register</button>
            <button id="showLogin" class="choice-btn" type="button">Login</button>
        </div>

        <form id="registerForm" novalidate>
            <div class="field">
                <label for="registerEmail">Email</label>
                <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <div class="field">
                <label for="registerPassword">Password</label>
                <input id="registerPassword" name="password" type="password" placeholder="Enter password" required />
            </div>
            <button class="submit-btn" type="submit">Create Account</button>
        </form>

        <form id="loginForm" novalidate>
            <div class="field">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <div class="field">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" name="password" type="password" placeholder="Enter password" required />
            </div>
            <button class="submit-btn" type="submit">Log In</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>
    </main>
</body>
</html>
